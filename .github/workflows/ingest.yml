name: Ingest OpenElectricity

# Scheduled workflows only start running once this file is on the
# default branch (main) — the schedule below takes effect after the
# first push/merge to main, not before.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 15 minutes; adjust to taste
  workflow_dispatch: {}       # manual "Run workflow" button

concurrency:
  group: ingest-openelectricity
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: services/data-pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/data-pipeline/uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Trigger OpenElectricity ingest
        env:
          OE_API_KEY: ${{ secrets.OE_API_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: uv run python scripts/trigger_ingest_openelectricity.py
