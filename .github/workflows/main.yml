name: CI

# Lint + test the whole uv workspace (root + services/data-pipeline).
# Mirrors `make lint` / `make test` exactly — if this fails, those
# fail locally too, and vice versa.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            services/*/uv.lock

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Lint (ruff + mypy + bandit)
        run: make lint

      - name: Test (pytest + coverage + pip-audit)
        run: make test
