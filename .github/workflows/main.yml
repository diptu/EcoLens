name: CI

# Two independent jobs, one per stack -- neither triggers the other's
# toolchain steps. lint-and-test mirrors `make lint`/`make test` for the
# uv workspace (root + services/data-pipeline + services/forecast-api);
# dashboard lints/tests/builds services/dashboard (Next.js, its own
# pnpm-workspace.yaml, unrelated to the uv workspace above).

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            services/*/uv.lock

      - name: Install dependencies
        run: uv sync --all-packages --all-groups

      - name: Lint (ruff + mypy + bandit)
        run: make lint

      - name: Test (pytest + coverage + pip-audit)
        run: make test

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: services/dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build (static export)
        run: pnpm build
