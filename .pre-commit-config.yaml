repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^services/.*\.py$
      - id: ruff-format
        files: ^services/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --explicit-package-bases]
        files: ^services/.*\.py$
        additional_dependencies: [pydantic>=2.13.4]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, -x, tests]
        files: ^services/.*\.py$