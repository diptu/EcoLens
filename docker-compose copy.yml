# ─────────────────────────────────────────────────────────────────────────────
# ecoLens — local development stack
# `make up` to start, `make down` to stop, `make logs` to tail.
# ─────────────────────────────────────────────────────────────────────────────
name: ecolens

x-common-env: &common-env
  env_file:
    - .env
  restart: unless-stopped

services:
  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    <<: *common-env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecolens}
      POSTGRES_USER: ${POSTGRES_USER:-ecolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecolens}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecolens} -d ${POSTGRES_DB:-ecolens}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    <<: *common-env
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass $$REDIS_PASSWORD --maxmemory 256mb --maxmemory-policy allkeys-lru;
        else
          redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru;
        fi
      "
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Object storage ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    <<: *common-env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:RELEASE.2024-08-26T15-33-02Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb -p local/${S3_BUCKET_RAW:-ecolens} || true;
      mc mb -p local/${S3_BUCKET_MODELS:-ecolens}/mlflow || true;
      mc anonymous set none local/${S3_BUCKET_RAW:-ecolens};
      mc anonymous set none local/${S3_BUCKET_MODELS:-ecolens};
      "
    restart: "no"

  # ── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: infra/docker/mlflow.Dockerfile
    <<: *common-env
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-ecolens}:${POSTGRES_PASSWORD:-ecolens}@postgres:5432/${POSTGRES_DB:-ecolens}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri postgresql://${POSTGRES_USER:-ecolens}:${POSTGRES_PASSWORD:-ecolens}@postgres:5432/${POSTGRES_DB:-ecolens}
        --default-artifact-root s3://${S3_BUCKET_MODELS:-ecolens}/mlflow
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  # ── Prefect worker ────────────────────────────────────────────────────────
  prefect:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    <<: *common-env
    command: >
      prefect worker start --pool ecolens-pool --type process
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    <<: *common-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Web ───────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/web.Dockerfile
    <<: *common-env
    environment:
      NEXT_PUBLIC_API_BASE: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:3.2.1
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafana:
